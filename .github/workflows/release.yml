name: Release

# Build a distributable plugin zip and attach it to a GitHub Release whenever a
# version tag (e.g. v1.0.0) is pushed.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          SLUG=gravityformstripleseat
          mkdir -p build/"$SLUG"
          rsync -a ./ build/"$SLUG"/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='build' \
            --exclude='composer.lock' \
            --exclude='vendor' \
            --exclude='node_modules' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='eslint.config.js'
          cd build
          zip -rq "$SLUG.zip" "$SLUG"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            build/gravityformstripleseat.zip \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
