name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.0", "8.1", "8.2", "8.3"]

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP syntax check
        run: find . -path ./vendor -prune -o -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      - name: Coding standards (PHPCS)
        if: ${{ hashFiles('phpcs.xml', 'phpcs.xml.dist', '.phpcs.xml', '.phpcs.xml.dist') != '' }}
        run: composer lint

      - name: Unit tests (PHPUnit)
        if: ${{ hashFiles('phpunit.xml', 'phpunit.xml.dist', 'tests/**') != '' }}
        run: composer test

  js:
    name: JS lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint JS (ESLint)
        run: npm run lint:js
